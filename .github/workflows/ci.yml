name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
